services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - homesoc-data:/app/backend/data
    environment:
      - HOMESOC_HOST=0.0.0.0
      - HOMESOC_PORT=8443
      - HOMESOC_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:8080"]
      - HOMESOC_REDIS_URL=redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8443/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.worker.notifier"]
    environment:
      - HOMESOC_REDIS_URL=redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  homesoc-data:
